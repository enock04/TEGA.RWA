version: '3.9'

services:

  # ─── Nginx reverse proxy + SSL ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tega_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend-passenger
      - frontend-agency
      - frontend-admin
      - backend

  # ─── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tega_rw_backend
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Passenger App ────────────────────────────────────────────────────────
  frontend-passenger:
    build:
      context: ./frontend-passenger
      dockerfile: Dockerfile
    container_name: tega_rw_passenger
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://api.tega.rw/api/v1
    expose:
      - "3000"

  # ─── Agency App ───────────────────────────────────────────────────────────
  frontend-agency:
    build:
      context: ./frontend-agency
      dockerfile: Dockerfile
    container_name: tega_rw_agency
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://api.tega.rw/api/v1
    expose:
      - "3000"

  # ─── Admin App ────────────────────────────────────────────────────────────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: tega_rw_admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://api.tega.rw/api/v1
    expose:
      - "3000"

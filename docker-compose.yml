version: '3.9'

services:

  # ─── PostgreSQL Database ─────────────────────
  db:
    image: postgres:15-alpine
    container_name: tega_rw_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tega_rw_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tega_rw_pass_2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_initial.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/migrations/002_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tega_rw_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend API ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tega_rw_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tega_rw_db
      DB_USER: postgres
      DB_PASSWORD: tega_rw_pass_2025
      JWT_SECRET: tega_rw_jwt_secret_change_in_production_2025
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: tega_rw_refresh_secret_change_in_production_2025
      JWT_REFRESH_EXPIRES_IN: 30d
      FRONTEND_URL: http://localhost:3000
      EMAIL_FROM: noreply@tega.rw
      SMS_API_KEY: mock_sms_key
      SMS_SENDER_ID: TEGA.Rw
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src   # hot-reload in dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tega_rw_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:

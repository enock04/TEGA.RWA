version: '3.9'

services:

  # ─── Backend API ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tega_rw_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      DB_HOST: aws-1-eu-west-3.pooler.supabase.com
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres.ujphhjdrnuolxtddpkzs
      DB_PASSWORD: "ntwari@0912"
      JWT_SECRET: tega_rw_jwt_secret_change_in_production_2025
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: tega_rw_refresh_secret_change_in_production_2025
      JWT_REFRESH_EXPIRES_IN: 30d
      FRONTEND_URL: http://localhost:3000,http://localhost:3001,http://localhost:3002
      EMAIL_FROM: noreply@tega.rw
      SMS_API_KEY: mock_sms_key
      SMS_SENDER_ID: TEGA.Rw
      WEBHOOK_SECRET: tega_rw_webhook_secret_change_in_production_2025
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src   # hot-reload in dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Passenger App (port 3000) ────────────────
  frontend-passenger:
    build:
      context: ./frontend-passenger
      dockerfile: Dockerfile
    container_name: tega_rw_passenger
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"

  # ─── Staff Portal / Admin App (port 3001) ────
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: tega_rw_admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3001:3000"

events {
  worker_connections 1024;
}

http {
  # ── Security defaults ──────────────────────────────────────────────────────
  server_tokens off;
  client_max_body_size 10m;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name tega.rw www.tega.rw app.tega.rw agency.tega.rw admin.tega.rw api.tega.rw;
    return 301 https://$host$request_uri;
  }

  # ── Passenger App — app.tega.rw ───────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name app.tega.rw;

    ssl_certificate     /etc/letsencrypt/live/tega.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tega.rw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
      proxy_pass         http://frontend-passenger:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── Agency Portal — agency.tega.rw ────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name agency.tega.rw;

    ssl_certificate     /etc/letsencrypt/live/tega.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tega.rw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
      proxy_pass         http://frontend-agency:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── Admin Panel — admin.tega.rw ───────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name admin.tega.rw;

    ssl_certificate     /etc/letsencrypt/live/tega.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tega.rw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Restrict admin to known IPs (add your office/VPN IPs here)
    # allow 197.243.x.x;
    # deny all;

    location / {
      proxy_pass         http://frontend-admin:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── Backend API — api.tega.rw ─────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.tega.rw;

    ssl_certificate     /etc/letsencrypt/live/tega.rw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tega.rw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /api/v1/auth {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
